<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces — blush & sage" subtitle="Warm page, alt, and card surfaces — Palette 3 B2C confirmed" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#190828;padding:24px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:64px;border:0.5px solid rgba(255,255,255,0.10);}
  .name{font-size:12px;font-weight:500;color:#FDF8F9;}
  .hex{font-size:11px;color:rgba(253,248,249,0.45);letter-spacing:0.04em;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F5F0F1"></div><span class="name">Blush White</span><span class="hex">#F5F0F1 · page</span></div>
    <div class="sw"><div class="chip" style="background:#F8E0E2"></div><span class="name">Blush Light</span><span class="hex">#F8E0E2 · alt section</span></div>
    <div class="sw"><div class="chip" style="background:#EDE5E6"></div><span class="name">Blush Mid</span><span class="hex">#EDE5E6 · muted section</span></div>
    <div class="sw"><div class="chip" style="background:#C8C6B8"></div><span class="name">Sage Light</span><span class="hex">#C8C6B8 · warm neutral</span></div>
    <div class="sw"><div class="chip" style="background:#FDF8F9"></div><span class="name">Warm White</span><span class="hex">#FDF8F9 · card / nav</span></div>
  </div>
</body></html>
