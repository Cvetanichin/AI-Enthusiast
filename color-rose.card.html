<!-- @dsCard group="Colors" viewport="700x150" name="Pink — accent & emphasis" subtitle="Hot pink primary · blush light · deep hover · pale wash — Palette 3 B2C confirmed" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#F5F0F1;padding:24px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:64px;border:0.5px solid rgba(229,83,129,0.15);}
  .name{font-size:12px;font-weight:500;color:#190828;}
  .hex{font-size:11px;color:#9B9987;letter-spacing:0.04em;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E55381;border-color:transparent"></div><span class="name">Pink</span><span class="hex">#E55381 · primary accent</span></div>
    <div class="sw"><div class="chip" style="background:#C23368;border-color:transparent"></div><span class="name">Pink Deep</span><span class="hex">#C23368 · hover / emphasis</span></div>
    <div class="sw"><div class="chip" style="background:#EFA9AE"></div><span class="name">Blush</span><span class="hex">#EFA9AE · light accent / tint</span></div>
    <div class="sw"><div class="chip" style="background:#FCE8EE"></div><span class="name">Blush Pale</span><span class="hex">#FCE8EE · wash / pale surface</span></div>
  </div>
</body></html>
