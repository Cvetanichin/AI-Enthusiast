<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Subtle, warm, charcoal-tinted — lift, never drama" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--ivory);padding:30px 32px;color:var(--charcoal);}
  .row{display:flex;gap:28px;flex-wrap:wrap;}
  .demo{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .box{width:100px;height:64px;background:var(--white);border-radius:var(--radius-xs);border:0.5px solid var(--border-rose);}
  .v{font-size:11px;color:var(--charcoal);font-weight:500;}
  .lab{font-size:10px;color:var(--charcoal-light);}
</style></head>
<body>
  <div class="row">
    <div class="demo"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="v">shadow-xs</span><span class="lab">resting</span></div>
    <div class="demo"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="v">shadow-sm</span><span class="lab">card</span></div>
    <div class="demo"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="v">shadow-md</span><span class="lab">hover lift</span></div>
    <div class="demo"><div class="box" style="box-shadow:var(--shadow-rose)"></div><span class="v">shadow-rose</span><span class="lab">accent lift</span></div>
  </div>
</body></html>
