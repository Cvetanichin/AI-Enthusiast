<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base step — tight gaps to section rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--ivory);padding:24px 32px;color:var(--charcoal);}
  .row{display:flex;align-items:flex-end;gap:18px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--rose);width:18px;border-radius:1px;}
  .lab{font-size:10px;color:var(--charcoal-light);letter-spacing:0.04em;}
  .v{font-size:11px;color:var(--charcoal);font-weight:500;}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:8px"></div><span class="v">8</span><span class="lab">space-2</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="v">16</span><span class="lab">space-4</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="v">24</span><span class="lab">space-6</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="v">32</span><span class="lab">space-8</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="v">48</span><span class="lab">space-12</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="v">64</span><span class="lab">section-gap</span></div>
    <div class="col"><div class="bar" style="height:80px"></div><span class="v">80</span><span class="lab">section-py</span></div>
  </div>
</body></html>
