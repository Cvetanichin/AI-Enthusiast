<!-- @dsCard group="Type" viewport="700x230" name="Outfit — sans body & UI" subtitle="Clean humanist sans for body, labels, and buttons" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--ivory);padding:28px 32px;color:var(--charcoal);}
  .meta{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--rose);margin-bottom:16px;font-weight:500;}
  .body{font-size:14px;font-weight:300;line-height:1.9;color:var(--charcoal-mid);max-width:440px;margin:0;}
  .weights{display:flex;gap:24px;margin-top:18px;}
  .w{font-size:16px;}
  .w span{display:block;font-size:10px;color:var(--charcoal-light);letter-spacing:0.04em;margin-top:2px;}
</style></head>
<body>
  <div class="meta">Outfit · 300 / 400 / 500 / 600</div>
  <p class="body">No course. No audience required. No complicated setup. One calm, practical kit — four sections, five ready-to-use tools, fourteen days. Highly readable and quietly confident.</p>
  <div class="weights">
    <div class="w" style="font-weight:300">Light<span>300 · body</span></div>
    <div class="w" style="font-weight:400">Regular<span>400 · emphasis</span></div>
    <div class="w" style="font-weight:500">Medium<span>500 · labels</span></div>
    <div class="w" style="font-weight:600">Semibold<span>600 · rare</span></div>
  </div>
</body></html>
