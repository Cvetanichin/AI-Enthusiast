<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--ivory);color:var(--charcoal);
    display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:220px;}
  .panel{padding:36px 32px;display:flex;flex-direction:column;justify-content:center;gap:14px;}
  .mark{font-family:var(--font-display);font-weight:300;letter-spacing:0.22em;text-transform:uppercase;font-size:22px;}
  .mark-sm{font-family:var(--font-display);font-weight:300;letter-spacing:0.22em;text-transform:uppercase;font-size:13px;}
  .tag{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;}
</style></head>
<body>
  <div class="panel" style="background:var(--ivory)">
    <div class="mark" style="color:var(--charcoal)">Cvetanichin</div>
    <div class="tag" style="color:var(--rose-deep)">Digital products for women who are ready</div>
    <div class="mark-sm" style="color:var(--charcoal-mid);margin-top:6px">Cvetanichin</div>
  </div>
  <div class="panel" style="background:var(--charcoal)">
    <div class="mark" style="color:var(--white)">Cvetanichin</div>
    <div class="tag" style="color:var(--rose-light)">On charcoal · wide 0.22em tracking</div>
  </div>
</body></html>
