<!-- @dsCard group="Brand" viewport="700x180" name="Motion — quiet reveal" subtitle="Gentle fade-up on scroll; hover feedback only" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--ivory);color:var(--charcoal);padding:28px 32px;}
  .meta{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--rose);margin-bottom:20px;font-weight:500;}
  .row{display:flex;gap:14px;}
  .card{flex:1;background:var(--white);border:0.5px solid var(--border-rose);border-radius:var(--radius-xs);
    padding:18px;opacity:0;transform:translateY(28px);
    animation:rise var(--dur-reveal) var(--ease-out) forwards;}
  .card:nth-child(2){animation-delay:.12s;}
  .card:nth-child(3){animation-delay:.24s;}
  .card:nth-child(4){animation-delay:.36s;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .n{font-family:var(--font-display);font-size:24px;font-weight:300;color:var(--rose-deep);}
  .l{font-size:11px;color:var(--charcoal-mid);margin-top:6px;}
  .note{font-size:11px;color:var(--charcoal-light);margin-top:18px;line-height:1.7;}
</style></head>
<body>
  <div class="meta">Reveal · 0.7s ease-out · 28px rise · staggered 0.12s</div>
  <div class="row">
    <div class="card"><div class="n">01</div><div class="l">Fade up</div></div>
    <div class="card"><div class="n">02</div><div class="l">Stagger</div></div>
    <div class="card"><div class="n">03</div><div class="l">Settle</div></div>
    <div class="card"><div class="n">04</div><div class="l">Rest</div></div>
  </div>
  <p class="note">Quiet and restrained: gentle fades and slides on enter, hover feedback only. No bounce, no spring, no looping decoration.</p>
</body></html>
