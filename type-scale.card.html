<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Hero, display, headings, body, micro-labels" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--ivory);padding:28px 32px;color:var(--charcoal);}
  .line{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:0.5px solid var(--border-rose);}
  .line:last-child{border-bottom:none;}
  .tag{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--charcoal-light);width:120px;flex-shrink:0;}
  .spec{font-family:var(--font-display);font-weight:300;color:var(--charcoal);line-height:1.1;}
</style></head>
<body>
  <div class="line"><span class="tag">Hero · 72/200</span><span class="spec" style="font-size:44px;font-weight:200">The First Offer Kit</span></div>
  <div class="line"><span class="tag">Display · 44/200</span><span class="spec" style="font-size:32px;font-weight:200">Start earning</span></div>
  <div class="line"><span class="tag">Heading · 32/300</span><span class="spec" style="font-size:26px">For women rebuilding</span></div>
  <div class="line"><span class="tag">Tagline · 21/300</span><span class="spec" style="font-size:21px">A clear, simple path</span></div>
  <div class="line"><span class="tag">Body · 14/300</span><span class="spec" style="font-family:var(--font-body);font-size:14px;font-weight:300;color:var(--charcoal-mid)">Highly readable, quietly confident body copy.</span></div>
  <div class="line"><span class="tag">Eyebrow · 10/500</span><span class="spec" style="font-family:var(--font-body);font-size:10px;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;color:var(--rose)">Who this is for</span></div>
</body></html>
