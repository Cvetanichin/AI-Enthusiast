<!-- @dsCard group="Colors" viewport="700x200" name="Surface pairings" subtitle="How ink and accent sit on each surface — Palette 3 B2C confirmed" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#F5F0F1;padding:24px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .pair{padding:18px;border:0.5px solid rgba(229,83,129,0.15);}
  .ey{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;font-weight:500;margin-bottom:8px;}
  .hd{font-family:var(--font-display);font-weight:300;font-size:22px;line-height:1.1;}
  .bd{font-size:11px;line-height:1.6;margin-top:6px;font-weight:300;}
</style></head>
<body>
  <div class="row">
    <div class="pair" style="background:#F5F0F1">
      <div class="ey" style="color:#E55381">On blush-white</div>
      <div class="hd" style="color:#190828">Calm, clear, <em style="color:#C23368">earned</em></div>
      <div class="bd" style="color:#685762">Deep text, pink-deep emphasis.</div>
    </div>
    <div class="pair" style="background:#190828;border-color:rgba(255,255,255,0.07)">
      <div class="ey" style="color:#EFA9AE">On deep</div>
      <div class="hd" style="color:#FDF8F9">Quiet <em>authority</em></div>
      <div class="bd" style="color:rgba(253,248,249,0.5)">White text, blush accents.</div>
    </div>
    <div class="pair" style="background:#E55381;border-color:transparent">
      <div class="ey" style="color:rgba(253,248,249,0.65)">On pink</div>
      <div class="hd" style="color:#FDF8F9">Warm <em>conviction</em></div>
      <div class="bd" style="color:rgba(253,248,249,0.8)">White text on the accent.</div>
    </div>
  </div>
</body></html>
