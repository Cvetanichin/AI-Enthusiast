<!-- @dsCard group="Colors" viewport="700x150" name="Deep — text & dark surfaces" subtitle="Purple-black · mauve · sage — Palette 3 B2C confirmed" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#F5F0F1;padding:24px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:64px;}
  .name{font-size:12px;font-weight:500;color:#190828;}
  .hex{font-size:11px;color:#9B9987;letter-spacing:0.04em;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#190828"></div><span class="name">Deep</span><span class="hex">#190828 · headings, inverse</span></div>
    <div class="sw"><div class="chip" style="background:#2E1A3A"></div><span class="name">Deep Mid</span><span class="hex">#2E1A3A · hover on dark</span></div>
    <div class="sw"><div class="chip" style="background:#685762"></div><span class="name">Mauve</span><span class="hex">#685762 · body text</span></div>
    <div class="sw"><div class="chip" style="background:#9B9987"></div><span class="name">Sage</span><span class="hex">#9B9987 · captions, muted</span></div>
  </div>
</body></html>
