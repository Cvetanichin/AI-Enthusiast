<!-- @dsCard group="Type" viewport="700x230" name="Fraunces — serif display" subtitle="Light-weight editorial serif with true italic emphasis" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-display);background:var(--ivory);padding:28px 32px;color:var(--charcoal);}
  .meta{font-family:var(--font-body);font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--rose);margin-bottom:18px;font-weight:500;}
  .big{font-size:56px;font-weight:200;line-height:1;letter-spacing:-0.02em;margin:0;}
  .big em{font-style:italic;font-weight:200;color:var(--rose-deep);}
  .sub{font-size:21px;font-weight:300;margin-top:16px;color:var(--charcoal-mid);}
  .scale{font-family:var(--font-body);font-size:11px;color:var(--charcoal-light);margin-top:18px;letter-spacing:0.03em;}
</style></head>
<body>
  <div class="meta">Fraunces · 200 / 300 · italic</div>
  <p class="big">Build it,<br><em>quietly</em>.</p>
  <p class="sub">You already have everything you need.</p>
  <p class="scale">Display 200 · Sub-display 300 · true italic for emphasis · tracking −0.02em</p>
</body></html>
