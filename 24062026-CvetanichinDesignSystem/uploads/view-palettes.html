<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #222; display: flex; gap: 20px; padding: 20px; }
  canvas { border: 1px solid #444; }
  h2 { color: white; font-family: sans-serif; margin: 0 0 8px; }
  .wrap { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="wrap">
  <h2>Palette 1 — CSO Consultancy (B2B)</h2>
  <canvas id="c1"></canvas>
</div>
<div class="wrap">
  <h2>Palette 3 — Self-Improvement (B2C)</h2>
  <canvas id="c3"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  async function renderPDF(url, canvasId) {
    const pdf = await pdfjsLib.getDocument(url).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 2 });
    const canvas = document.getElementById(canvasId);
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }

  renderPDF('palette1.pdf', 'c1');
  renderPDF('palette3.pdf', 'c3');
</script>
</body>
</html>
